# move up
up_keyboard = up, w
up_controller = dpad_up

# move down
right_keyboard = right, d
right_controller = dpad_right

# move left
down_keyboard = down, s
down_controller = dpad_down

# move right
left_keyboard = left, a
left_controller = dpad_left

# overworld: jump
jump_keyboard = space
jump_controller = bottom

# overworld: sprint
sprint_keyboard = control, n
sprint_controller = left

# overworld: interact
interact_keyboard = x
interact_controller = top

# overworld: pause
pause_keyboard = escape
pause_controller = start

# menu: confirm
confirm_keyboard = space
confirm_controller = right

# menu: back
back_keyboard = b, escape
back_controller = bottom

# menu: reset to default
reset_keyboard = x, y
reset_controller = top

# special
special_keyboard = backspace
special_controller = left_shoulder, right_shoulder
