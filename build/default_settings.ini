# should window start in fullscreen mode
is_fullscreen = false

# should window have a title bar
is_borderless = true

# initial window width
window_width = 1067

# initial window height
window_height = 600

# can window be resized
window_resizable = true

# use system dpi
use_dpi_scale = false

# show the console on startup
show_console = true

# allow OpenGL Backend
allow_opengl = true

# allow Vulkan Backend
allow_vulkan = true

# allow Metal Backend (MacOS only)
allow_metal = true

# vsync mode, one of `on`, `off`, `adaptive`
vsync = adaptive

# sound effect volume, in [0.0, 1.0]
sound_effect_level = 1.0

# music volume, in [0.0, 1.0]
music_level = 1.0

# enable screen shake
is_screen_shake_enabled = true

# enable additional UI elements for game elements relying on colors
color_blind_mode = false

# text scrolling speed, in [0.0, 1.0]
text_speed = 1.0

# player sprint mode, one of `hold_to_sprint`, `hold_to_walk`
player_sprint_mode = hold_to_sprint

# input buffering is enabled
input_buffering_enabled = true

# double press threshold, in [0.0, 1.0]
double_press_threshold = 0.5

# left / right joystick deadzone, in [0.0, 1.0]
joystick_deadzone = 0.05

# left / right trigger deadzone, in [0.0, 1.0]
trigger_deadzone = 0.0

# controller vibration strength, in [0.0, 1.0]
controller_vibration = 1.0

# draw debug information such as fps, cpu usage, etc.
draw_debug_information = true

# draw overlay that shows speedrun splits
draw_speedrun_splits = true

# enabled performance mode, overrides any setting below this one
performance_mode_enabled = false

# multi sample anti aliasing, integer < 8
msaa = 2

# HDR output enabled
is_hdr_enabled = true

# Bloom enabled
is_bloom_enabled = true
